host: localhost:2053
info:
  contact: {}
  description: VPN Panel Management API
  title: Proxima VPN API
  version: 0.1.0
paths:
  /admin/announcements:
    get:
      description: Returns all announcements ordered by creation date
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.announcementItem'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List announcements
      tags:
      - admin-announcements
    post:
      consumes:
      - application/json
      description: Creates a new announcement
      parameters:
      - description: Announcement details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createAnnouncementRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.announcementItem'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create announcement
      tags:
      - admin-announcements
  /admin/announcements/{id}:
    delete:
      description: Deletes an announcement by ID
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete announcement
      tags:
      - admin-announcements
    put:
      consumes:
      - application/json
      description: Partially updates an announcement
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateAnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.announcementItem'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update announcement
      tags:
      - admin-announcements
  /admin/auth/2fa/disable:
    post:
      consumes:
      - application/json
      description: Verify TOTP code and disable 2FA for the admin account
      parameters:
      - description: TOTP code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.disable2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Disable 2FA
      tags:
      - admin-auth
  /admin/auth/2fa/enable:
    post:
      consumes:
      - application/json
      description: Verify TOTP code and enable 2FA for the admin account
      parameters:
      - description: Secret and TOTP code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.enable2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Enable 2FA
      tags:
      - admin-auth
  /admin/auth/2fa/setup:
    get:
      description: Generate a TOTP secret and otpauth URL for the admin to scan
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Setup 2FA
      tags:
      - admin-auth
  /admin/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate admin with email/password and optional TOTP
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.loginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Admin login
      tags:
      - admin-auth
  /admin/backup/download:
    get:
      description: Downloads a backup file by key (defaults to latest)
      parameters:
      - description: Backup key
        in: query
        name: key
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Download backup
      tags:
      - admin-backup
  /admin/backup/list:
    get:
      description: Returns a list of available backups
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List backups
      tags:
      - admin-backup
  /admin/backup/trigger:
    post:
      description: Triggers a manual database backup
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Trigger backup
      tags:
      - admin-backup
  /admin/inbounds/{id}:
    delete:
      description: Removes an inbound by ID
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete inbound
      tags:
      - admin-inbounds
    put:
      consumes:
      - application/json
      description: Partially updates an inbound configuration
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateInboundRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.inboundResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update inbound
      tags:
      - admin-inbounds
  /admin/inbounds/{id}/toggle:
    put:
      description: Toggles the enabled/disabled state of an inbound
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.inboundResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Toggle inbound
      tags:
      - admin-inbounds
  /admin/node-groups:
    get:
      description: Returns all node groups with their node counts
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.nodeGroupListItem'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List node groups
      tags:
      - admin-node-groups
    post:
      consumes:
      - application/json
      description: Creates a new node group
      parameters:
      - description: Node group name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createNodeGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.nodeGroupListItem'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create node group
      tags:
      - admin-node-groups
  /admin/node-groups/{id}:
    delete:
      description: Deletes a node group and its node associations
      parameters:
      - description: Node Group ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete node group
      tags:
      - admin-node-groups
    get:
      description: Returns a single node group with its associated nodes
      parameters:
      - description: Node Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.nodeGroupDetail'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get node group
      tags:
      - admin-node-groups
    put:
      consumes:
      - application/json
      description: Updates a node group's name
      parameters:
      - description: Node Group ID
        in: path
        name: id
        required: true
        type: string
      - description: New name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createNodeGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update node group
      tags:
      - admin-node-groups
  /admin/node-groups/{id}/nodes:
    put:
      consumes:
      - application/json
      description: Replaces all nodes in a group with the provided node IDs
      parameters:
      - description: Node Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Node IDs to assign
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.setNodesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set nodes in group
      tags:
      - admin-node-groups
  /admin/nodes:
    get:
      description: Returns all registered (non-pending) nodes
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.nodeListItem'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
