name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build api-server
        run: cd api-server && go build ./...
      - name: Build node-agent
        run: cd node-agent && go build ./...
      - name: Build pkg
        run: cd pkg && go build ./...
      - name: Test api-server
        run: cd api-server && go test ./...
      - name: Test node-agent
        run: cd node-agent && go test ./...
      - name: Test pkg
        run: cd pkg && go test ./...

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint (api-server)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api-server
      - name: golangci-lint (node-agent)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: node-agent
      - name: golangci-lint (pkg)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: pkg

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd web && npm ci
      - name: Lint
        run: cd web && npm run lint
      - name: Build
        run: cd web && npm run build
